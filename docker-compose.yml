services:
  postgres:
    container_name: ms_pg_sql
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
#      POSTGRES_DB: ms_ps_db
      PGDATA: /var/lib/postgresql/data
    volumes:
        - postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - microservices-net:
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres:
  pgadmin:
  mongo: